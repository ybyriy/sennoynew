<script>
let continents = document.querySelectorAll('.continent');
let popupBg = document.querySelector('.info__bg');
let popup__photo = document.querySelector('.info__photo');
let popup__title = document.querySelector('.info__title');
let popup__text = document.querySelector('.info__text');
let tooltip = document.querySelector('.tooltip');

continents.forEach((item) => {
    item.addEventListener('click', function() {
        popup__title.textContent = this.getAttribute('data-title');
        popup__photo.setAttribute('src', this.getAttribute('data-photo'));
        popup__text.textContent = this.getAttribute('data-text');
        popupBg.classList.add('active');
    });

    item.addEventListener('mouseenter', function() {
        tooltip.textContent = item.getAttribute('data-title');
        tooltip.style.display = 'block';
    });

    item.addEventListener('mouseleave', function() {
        tooltip.textContent = item.getAttribute('data-title');
        tooltip.style.display = 'none';
    }); 

    // ВСТАВИЛ ПО СОВЕТУ Х
    item.addEventListener('mousemove', function(e) {
    let tooltipWidth = tooltip.offsetWidth;
    let tooltipHeight = tooltip.offsetHeight;
    let x = e.clientX + 20;
    let y = e.clientY + 20;
    if (x + tooltipWidth > window.innerWidth) x = e.clientX - tooltipWidth - 20;  // Flip to left if overflowing right
    if (y + tooltipHeight > window.innerHeight) y = e.clientY - tooltipHeight - 20;  // Flip above
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
});

   
   /* item.addEventListener('mousemove', function(e) {
        tooltip.style.top = (e.y + 20) + 'px';
        tooltip.style.left = (e.x + 20) + 'px';
    });*/

});

document.addEventListener('click', (e) => {
    if(e.target === popupBg) {
        popupBg.classList.remove('active');
    }
});
</script>
<!--slider-->
<script>

    let slideIndex = 1;
showSlides(slideIndex);

// Управление кнопками предыдущий/следующий
function plusSlides(n) {
  showSlides(slideIndex += n);
}

// Управление кликом по индикаторам
function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  if (n > slides.length) {
    slideIndex = 1;
  }
  if (n < 1) {
    slideIndex = slides.length;
  }
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex - 1].style.display = "block";
  dots[slideIndex - 1].className += " active";
}

// Для автоматической прокрутки (добавьте это, если нужно)
let autoSlide = setInterval(() => {
  plusSlides(1);
}, 3000); // Смена каждые 3 секунды

// Остановка автопрокрутки при наведении (опционально)
document.querySelector('.slideshow-container').addEventListener('mouseover', () => {
  clearInterval(autoSlide);
});
document.querySelector('.slideshow-container').addEventListener('mouseout', () => {
  autoSlide = setInterval(() => {
    plusSlides(1);
  }, 3000);
});

</script>
